{% extends "base.html" %}
{% load static %}

{% block title %}
  <title data-normal-text="Ứng dụng nhận diện khuôn mặt">Luân Hồi Truy Diện Kính</title>
{% endblock %}

{% block content %}

  <div class="container">
    <h1 class="title app-title" data-normal-text="Ứng dụng nhận diện khuôn mặt">Luân Hồi Truy Diện Kính</h1>
    <h2 class="subtitle" data-normal-text="Hệ thống nhận diện khuôn mặt">Cực Đạo Đế Binh</h2>
    <p class="subtitle" data-normal-text="Nhận diện khuôn mặt và quản lý người dùng">Pháp bảo soi linh diện, ghi danh đạo hữu</p>
    
    <a href="{% url 'recognition' %}" class="option-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        <path d="M15 11l2 2 4-4"/>
      </svg>
      <span data-normal-text="Nhận diện bằng camera">Khai Kính Dò Linh Diện</span>
    </a>

    <a href="{% url 'video-recognition' %}" class="option-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="5" width="14" height="14" rx="2"/>
        <path d="M17 9l4-2v10l-4-2"/>
        <path d="M8 9l4 3-4 3z"/>
      </svg>
      <span data-normal-text="Nhận diện bằng video">Linh Ảnh Lưu Chuyển</span>
    </a>
    
    <a href="{% url 'register' %}" class="option-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        <path d="M16 11h6m-3-3v6"/>
      </svg>
      <span data-normal-text="Đăng ký người dùng">Ghi Danh</span>
    </a>
  </div>

{% endblock %}
