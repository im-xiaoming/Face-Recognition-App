{% load static %}

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% block title %}{% endblock %}

  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  {% block css %}{% endblock %}
</head>
<body>
  <canvas id="cultivation-bg" class="cultivation-bg" aria-hidden="true"></canvas>
  <div class="transition-veil" aria-hidden="true">
    <div class="veil-ring"></div>
    <div class="veil-cloud veil-cloud-left"></div>
    <div class="veil-cloud veil-cloud-right"></div>
  </div>

  <!-- Menu -->
  <button class="menu-btn" onclick="toggleMenu()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <div class="menu-dropdown" id="menu">
    <a href="{% url 'home' %}" class="menu-item" data-normal-text="Trang chủ">Đạo Môn</a>
    <a href="{% url 'users' %}" class="menu-item" data-normal-text="Danh sách người dùng">Danh Sách Đạo Hữu</a>
    <button type="button" class="menu-item text-mode-toggle" id="text-mode-toggle" aria-pressed="false">
      Chữ thường
    </button>
  </div>

  {% block content %}{% endblock %}

  <script type="module" src="{% static 'js/cultivation-scene.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>

  {% block js %}{% endblock %}
</body>
</html>
