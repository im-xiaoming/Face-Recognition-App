{% extends "base.html" %}
{% load static %}

{% block title %}
  <title>Recognition - Face Recognition</title>
{% endblock %}

{% block css %}
  <style>
    .container { max-width: 720px; }
    .camera-wrapper { max-width: 640px; position: relative; }
    .camera-view { aspect-ratio: 4/3; border-radius: 16px; }
    .camera-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 16px;
      z-index: 2;
    }
  </style>
{% endblock %}


{% block content %}
  <a href="{% url 'home' %}" class="back-btn">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </a>

  <div class="container">
    <h1 class="title">Recognition</h1>
    
    <div class="camera-wrapper">
      <video
        id="camera"
        class="camera-view"
        autoplay
        playsinline
        data-recognition-url="{% url 'recognition-api' %}"
      ></video>
      <canvas id="overlay" class="camera-overlay"></canvas>
    </div>
    
    <div id="status" class="status">Đang quét khuôn mặt...</div>
    
    <div class="camera-controls">
      <button class="control-btn stop-btn" onclick="stopCamera()">
        <svg viewBox="0 0 24 24">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
  </div>
{% endblock %}


{% block js %}
  <script src="{% static 'recognizer/js/recognition.js' %}?v=4"></script>
  <script>
    (async function () {
      try {
        await initCamera('camera');
        startBackendRecognition();
      } catch (err) {
        showStatus(err.message);
      }
    }());
  </script>
{% endblock %}
